<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Proxy | Premium</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --list-header-bg: #111111;
            --accent-green: #22c55e;
            --text-main: #ffffff;
            --text-dim: #777;
            --border-color: #222;
            --reveal-duration: 0.6s;
            --stagger-delay: 0.03s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes skeleton-pulse {
            0% { background-color: #1a1a1a; }
            50% { background-color: #252525; }
            100% { background-color: #1a1a1a; }
        }

        .reveal {
            opacity: 0;
            animation: fadeInUp var(--reveal-duration) ease forwards;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            overflow-x: hidden; /* Защита от горизонтального скролла */
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* --- Шапка --- */
        .status-badge-container { margin-bottom: 25px; animation-delay: 0.1s; }
        .site-header { animation-delay: 0.25s; }
        .description { color: #666; font-size: 14px; line-height: 1.4; margin: 18px 0 35px 0; animation-delay: 0.4s; }

        .status-badge {
            display: inline-flex; align-items: center;
            background: rgba(34, 197, 94, 0.07);
            border: 1px solid rgba(34, 197, 94, 0.15);
            padding: 5px 12px; border-radius: 20px;
            font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
            color: var(--accent-green); text-transform: uppercase;
        }

        .pulse-dot {
            width: 7px; height: 7px; background-color: var(--accent-green);
            border-radius: 50%; margin-right: 8px; position: relative;
        }
        .pulse-dot::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-color: var(--accent-green); border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .site-header h1 { font-size: 38px; margin: 0; font-weight: 800; line-height: 1; }
        .site-header .accent { color: var(--accent-green); display: block; }

        .tg-channel-btn {
            display: inline-flex; align-items: center; background: #1a1a1a;
            color: #efefef; text-decoration: none; padding: 8px 15px;
            border-radius: 10px; font-size: 13px; font-weight: 600;
            margin-top: 15px; border: 1px solid var(--border-color); transition: 0.2s;
        }
        .tg-channel-btn:hover { border-color: var(--accent-green); background: #222; }

        /* --- Список --- */
        #proxy-list {
            display: flex; flex-direction: column; gap: 8px;
            background: var(--card-bg); padding: 8px;
            border: 1px solid var(--border-color); border-radius: 12px;
        }

        .list-inner-header {
            background: var(--list-header-bg); border-bottom: 1px solid var(--border-color);
            padding: 10px 18px; margin: -8px -8px 0 -8px;
            border-radius: 12px 12px 0 0; font-size: 11px;
            color: var(--text-dim); font-weight: 700;
            display: flex; align-items: center; justify-content: space-between;
        }

        .online-count { color: var(--accent-green); display: flex; align-items: center; gap: 5px; }

        /* --- Карточка прокси --- */
        .proxy-item {
            background: #1c1c1c; border-radius: 10px; padding: 12px;
            display: flex; align-items: center; text-decoration: none;
            color: white; transition: 0.15s ease; border: 1px solid transparent;
            opacity: 0; animation: fadeInUp var(--reveal-duration) ease forwards;
            min-width: 0; /* Нужно для корректной обрезки текста в flex */
        }

        .proxy-item:hover {
            background: #222; border-color: rgba(34, 197, 94, 0.3);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.25);
        }

        .proxy-item:active { transform: scale(0.98); }

        .proxy-number {
            background: #252525; color: #555; width: 32px; height: 32px;
            min-width: 32px; /* Чтобы номер не сжимался */
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 12px; font-weight: 800; margin-right: 12px;
        }

        .proxy-name { 
            flex-grow: 1; 
            font-size: 15px; 
            font-weight: 600; 
            display: flex; 
            align-items: center;
            white-space: nowrap; /* Не переносить на новую строку */
            overflow: hidden;    /* Прятать всё, что не влезло */
            text-overflow: ellipsis; /* Добавлять троеточие */
            min-width: 0; /* Магия flexbox для обрезки текста */
        }

        /* Бейджи */
        .badge-ru { opacity: 0.45; filter: saturate(0.8); font-size: 13px; margin-left: 6px; flex-shrink: 0; }
        
        .badge-tls { 
            opacity: 0.35; 
            font-size: 13px; 
            margin-left: 6px; 
            filter: grayscale(1); 
            flex-shrink: 0; 
            cursor: help;
        }

        .geo-code {
            font-size: 11px; font-weight: 800; color: #444; margin-left: 10px; margin-right: 8px;
            background: #252525; padding: 2px 5px; border-radius: 4px; flex-shrink: 0;
        }
        .arrow { color: #333; font-size: 16px; flex-shrink: 0; }

        /* --- Скелетоны --- */
        .skeleton {
            background: #1c1c1c; border-radius: 10px; padding: 12px;
            display: flex; align-items: center; margin-bottom: 8px;
        }
        .skeleton-box { animation: skeleton-pulse 1.5s infinite ease-in-out; border-radius: 4px; }
        .sk-num { width: 32px; height: 32px; margin-right: 12px; border-radius: 6px; flex-shrink: 0; }
        .sk-name { width: 60%; height: 16px; }
        .sk-geo { width: 30px; height: 16px; margin-left: auto; flex-shrink: 0; }

        .vpn-warning {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px; display: flex; gap: 12px;
            margin-top: 25px; animation-delay: 0.5s;
        }
        .info-icon {
            background: #222; width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #555; flex-shrink: 0;
        }
        .warning-text { color: #555; font-size: 12px; line-height: 1.4; }

        .footer-tag { text-align: center; margin-top: 25px; padding-bottom: 20px; }
        .mtproto-label {
            display: inline-block; border: 1px solid #222; padding: 3px 10px;
            border-radius: 5px; font-size: 9px; color: #333;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status-badge-container reveal">
        <div class="status-badge">
            <span class="pulse-dot"></span>
            Серверы активны
        </div>
    </div>

    <div class="site-header reveal">
        <h1>Telegram <span class="accent">Proxy</span></h1>
        <a href="https://t.me/telegaproxys" class="tg-channel-btn">@telegaproxys</a>
    </div>

    <p class="description reveal">
        MTProto прокси для стабильного доступа к Telegram. Нажми на сервер — он откроется прямо в приложении. Отключи VPN перед подключением.
    </p>

    <div id="proxy-list" class="reveal" style="animation-delay: 0.6s;">
        <div class="list-inner-header">
            <span>СПИСОК ДОСТУПНЫХ УЗЛОВ</span>
            <div class="online-count">
                <span style="font-size: 8px;">●</span> 
                <span id="counter-val">...</span> ОНЛАЙН
            </div>
        </div>

        <div id="proxy-items-container">
            <div class="skeleton">
                <div class="skeleton-box sk-num"></div>
                <div class="skeleton-box sk-name"></div>
                <div class="skeleton-box sk-geo"></div>
            </div>
            <div class="skeleton">
                <div class="skeleton-box sk-num"></div>
                <div class="skeleton-box sk-name"></div>
                <div class="skeleton-box sk-geo"></div>
            </div>
        </div>
    </div>

    <div class="vpn-warning reveal">
        <div class="info-icon">i</div>
        <div class="warning-text">
            Прокси не работает при включённом VPN. Отключи VPN перед подключением.
        </div>
    </div>

    <div class="footer-tag">
        <div class="mtproto-label">MTPROTO</div>
    </div>
</div>

<script>
    const JSON_URL = 'https://raw.githubusercontent.com/yoiambugger/MTProtolist/main/data.json';

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function loadProxies() {
        const container = document.getElementById('proxy-items-container');
        const counterVal = document.getElementById('counter-val');
        
        try {
            const res = await fetch(JSON_URL + '?t=' + Date.now());
            if (!res.ok) throw new Error();
            const data = await res.json();
            
            let ruGroup = data.filter(p => p.country === 'RU');
            let otherGroup = data.filter(p => p.country !== 'RU');
            ruGroup = shuffle(ruGroup);
            otherGroup = shuffle(otherGroup);
            const sortedData = [...ruGroup, ...otherGroup];

            counterVal.innerText = sortedData.length;
            container.innerHTML = '';

            const lastHosts = JSON.parse(localStorage.getItem('prev_hosts') || '[]');
            const currentHosts = sortedData.map(p => p.host);

            sortedData.slice(0, 100).forEach((p, index) => {
                const isNew = !lastHosts.includes(p.host);
                const isRU = p.country === 'RU';
                // ПРОВЕРКА FAKE TLS (ключ начинается на ee)
                const isFakeTLS = p.secret && p.secret.toLowerCase().startsWith('ee');
                const countryCode = p.country || 'UN';
                const displayIndex = (index + 1).toString().padStart(2, '0');
                
                const item = document.createElement('a');
                item.href = p.link;
                item.className = 'proxy-item';
                item.style.animationDelay = (0.7 + (index * 0.02)) + 's';
                
                item.innerHTML = `
                    <div class="proxy-number">${displayIndex}</div>
                    <div class="proxy-name">
                        <span style="overflow: hidden; text-overflow: ellipsis;">${p.host}</span>
                        ${isRU ? '<span class="badge-ru">🇷🇺</span>' : ''}
                        ${isFakeTLS ? '<span class="badge-tls" title="Fake TLS Proxy">👻</span>' : ''}
                        ${isNew ? '<span class="badge-new" style="background:var(--accent-green);color:black;font-size:8px;padding:1px 4px;border-radius:3px;margin-left:6px;font-weight:900;flex-shrink:0;">NEW</span>' : ''}
                    </div>
                    <div class="geo-code">${countryCode}</div>
                    <div class="arrow">→</div>
                `;
                container.appendChild(item);
            });

            localStorage.setItem('prev_hosts', JSON.stringify(currentHosts));
        } catch (e) {
            container.innerHTML = '<div style="padding:20px;text-align:center;color:#444;font-size:12px;">Ошибка сети...</div>';
        }
    }

    loadProxies();
    setInterval(loadProxies, 300000); 
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto Proxy List</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .site-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .site-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 25px;
        }
        .header-nav {
            margin-bottom: 25px;
        }
        .main-btn {
            display: inline-block;
            background: #1e1e1e;
            color: #fff;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .main-btn:hover { background: #252525; }

        .status-header {
            background: #161616;
            padding: 16px 15px;
            border-radius: 12px 12px 0 0;
            border: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .count-text { font-size: 13px; color: #888; font-weight: 600; letter-spacing: 0.5px; }

        .online-badge {
            background-color: #06221f;
            color: #4ade80;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
        }

        #proxy-list {
            background: #161616;
            border: 1px solid #222;
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .proxy-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-top: 1px solid #222;
            text-decoration: none;
            color: inherit;
        }
        .proxy-item:active { background: #1f1f1f; }
        .proxy-info { display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 5px #4ade80; }
        
        .host { font-size: 13px; color: #efefef; word-break: break-all; max-width: 250px; overflow: hidden; text-overflow: ellipsis; }
        .badge { 
            background: #3b3181; color: #a5b4fc; 
            font-size: 10px; padding: 2px 6px; 
            border-radius: 4px; font-weight: bold;
            margin-right: 8px;
        }
        
        /* Стилизация региона */
        .region-box { display: flex; align-items: center; gap: 5px; }
        .country-code { color: #555; font-size: 12px; font-weight: bold; }
        .warn-icon { opacity: 0.35; font-size: 12px; }

        .footer { margin-top: 20px; text-align: left; padding-bottom: 40px; }
        .info-text { color: #555; font-size: 13px; margin-bottom: 15px; line-height: 1.4; }
        .copyright { color: #333; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="site-title">MTProto Proxy</div>
    <div class="site-subtitle">Публичные прокси-серверы для Telegram</div>

    <div class="header-nav">
        <a href="https://t.me/telegaproxys" class="main-btn">@telegaproxys</a>
    </div>

    <div class="status-header">
        <span class="count-text">ОНЛАЙН СЕРВЕРЫ</span>
        <div class="online-badge">
            <span id="counter-val">0</span>&nbsp;онлайн
        </div>
    </div>
    
    <div id="proxy-list"></div>

    <div class="footer">
        <div class="info-text">
            Список обновляется автоматически. Только рабочие прокси выбранных регионов.
        </div>
        <div class="copyright">
            telegaproxys © 2026
        </div>
    </div>
</div>

<script>
    async function loadProxies() {
        const list = document.getElementById('proxy-list');
        const counterVal = document.getElementById('counter-val');
        
        try {
            const res = await fetch('data.json?t=' + Date.now());
            let data = await res.json();
            
            // Перемешиваем
            for (let i = data.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [data[i], data[j]] = [data[j], data[i]];
            }

            counterVal.innerText = data.length;
            list.innerHTML = '';

            const lastHosts = JSON.parse(localStorage.getItem('prev_hosts') || '[]');
            const currentHosts = data.map(p => p.host);

            data.slice(0, 100).forEach(p => {
                const isNew = !lastHosts.includes(p.host);
                const isRU = p.country === 'RU';
                
                list.innerHTML += `
                    <a href="${p.link}" class="proxy-item">
                        <div class="proxy-info">
                            <span class="dot"></span>
                            <span class="host">${p.host}</span>
                        </div>
                        <div class="region-box">
                            ${isNew ? '<span class="badge">NEW</span>' : ''}
                            ${isRU ? '<span class="warn-icon">⚠️</span>' : ''}
                            <span class="country-code">${p.country || 'UN'} ›</span>
                        </div>
                    </a>
                `;
            });

            localStorage.setItem('prev_hosts', JSON.stringify(currentHosts));
        } catch (e) {
            list.innerHTML = '<div style="padding:20px;text-align:center;color:#444;">Обновление базы...</div>';
        }
    }

    loadProxies();
    setInterval(loadProxies, 300000); 
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto Proxy List</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container { width: 100%; max-width: 600px; }
        .site-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
        .site-subtitle { font-size: 14px; color: #888; margin-bottom: 25px; }

        .status-header {
            background: #161616;
            padding: 16px 15px;
            border-radius: 12px 12px 0 0;
            border: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .online-badge {
            background-color: #06221f;
            color: #4ade80;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
        }

        #proxy-list {
            background: #161616;
            border: 1px solid #222;
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }
        .proxy-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-top: 1px solid #222;
            text-decoration: none;
            color: inherit;
        }
        .proxy-item:hover { background: #1a1a1a; }
        .proxy-info { display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 5px #4ade80; }
        .host { font-size: 13px; color: #efefef; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
        
        /* Стилизация региона и иконки */
        .region-box { display: flex; align-items: center; gap: 6px; }
        .region-code { color: #555; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .warning-icon { 
            opacity: 0.4; /* Приглушаем свет */
            filter: grayscale(0.4); /* Делаем менее насыщенным */
            font-size: 12px;
        }
        .arrow { color: #333; margin-left: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="site-title">MTProto Proxy</div>
    <div class="site-subtitle">Фильтр: RU, US, MD, DE, FI, SG, FR, SC</div>

    <div class="status-header">
        <span style="font-size: 13px; color: #888; font-weight: 600;">ОНЛАЙН СЕРВЕРЫ</span>
        <div class="online-badge"><span id="counter-val">0</span> онлайн</div>
    </div>
    
    <div id="proxy-list"></div>
</div>

<script>
    async function loadProxies() {
        const list = document.getElementById('proxy-list');
        const counter = document.getElementById('counter-val');
        
        try {
            const res = await fetch('data.json?t=' + Date.now());
            let data = await res.json();
            
            // Фильтр разрешенных регионов (на случай, если в JSON попало лишнее)
            const allowed = ['RU', 'US', 'MD', 'DE', 'FI', 'SG', 'FR', 'SC'];
            data = data.filter(p => allowed.includes(p.country));

            counter.innerText = data.length;
            list.innerHTML = '';

            data.forEach(p => {
                const isRU = p.country === 'RU';
                list.innerHTML += `
                    <a href="${p.link}" class="proxy-item">
                        <div class="proxy-info">
                            <span class="dot"></span>
                            <span class="host">${p.host}</span>
                        </div>
                        <div class="region-box">
                            ${isRU ? '<span class="warning-icon">⚠️</span>' : ''}
                            <span class="region-code">${p.country}</span>
                            <span class="arrow">›</span>
                        </div>
                    </a>
                `;
            });
        } catch (e) {
            list.innerHTML = '<div style="padding:20px;text-align:center;color:#444;">Синхронизация...</div>';
        }
    }
    loadProxies();
</script>
</body>
</html>
